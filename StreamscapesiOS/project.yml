name: Streamscapes
options:
  bundleIdPrefix: com.streamscapes
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false
packages:
  AudioKit:
    url: https://github.com/AudioKit/AudioKit.git
    exactVersion: "5.6.4"
  SoundpipeAudioKit:
    url: https://github.com/AudioKit/SoundpipeAudioKit.git
    exactVersion: "5.6.1"
  DunneAudioKit:
    url: https://github.com/AudioKit/DunneAudioKit.git
    exactVersion: "5.6.1"
targets:
  Streamscapes:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: AudioKit
      - package: SoundpipeAudioKit
      - package: DunneAudioKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.streamscapes.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen:
          UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocationWhenInUseUsageDescription: "Streamscapes uses your location to find nearby flights and weather."
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
        UIAppFonts:
          - SpaceGrotesk-Light.ttf
          - SpaceGrotesk-Regular.ttf
          - SpaceGrotesk-Medium.ttf
          - SpaceGrotesk-SemiBold.ttf
          - SpaceGrotesk-Bold.ttf
          - DMSans-Regular.ttf
          - DMSans-Medium.ttf
          - DMSans-SemiBold.ttf
          - DMSans-Bold.ttf
